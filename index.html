<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>심의 변경 현황 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --border: #E4E2DC;
    --border-subtle: #EEECE8;
    --text: #1A1916;
    --text-secondary: #6B6860;
    --text-tertiary: #9B9890;
    --accent-blue: #185FA5;
    --accent-blue-bg: #E6F1FB;
    --accent-orange: #BA7517;
    --accent-orange-bg: #FAEEDA;
    --accent-green: #3B6D11;
    --accent-green-bg: #EAF3DE;
    --accent-gray: #5A5855;
    --accent-gray-bg: #EDECE9;
    --fix-line: #EF9F27;
    --act-line: #378ADD;
    --don-line: #639922;
    --drp-line: #9B9890;
    --note-line: #C8C5BE;
    --font: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sep { width: 1px; height: 18px; background: var(--border); }
  .header-sub { font-size: 12px; color: var(--text-secondary); }
  .header-spacer { flex: 1; }
  .saved-pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-secondary);
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px;
  }
  .saved-dot { width: 6px; height: 6px; border-radius: 50%; background: #C8C5BE; flex-shrink: 0; }
  .saved-dot.ok { background: var(--accent-green); }
  .saved-dot.warn { background: var(--accent-orange); }
  .clear-btn {
    font-size: 10px; color: var(--text-tertiary);
    background: none; border: none; cursor: pointer;
    text-decoration: underline; padding: 0; margin-left: 2px;
  }
  .clear-btn:hover { color: var(--text); }

  /* ── Layout ── */
  .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 56px); }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }

  /* Upload zones */
  .upload-section { display: flex; flex-direction: column; gap: 8px; }
  .upload-label { font-size: 11px; font-weight: 500; color: var(--text-secondary); margin-bottom: 2px; }
  .uzone {
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg);
  }
  .uzone:hover { border-color: var(--accent-blue); background: var(--accent-blue-bg); }
  .uzone.ok { border-style: solid; border-color: var(--accent-blue); background: var(--accent-blue-bg); }
  .uzone-icon { font-size: 20px; margin-bottom: 4px; display: block; }
  .uzone-text { font-size: 11px; color: var(--text-secondary); line-height: 1.4; }
  .uzone-text strong { color: var(--text); display: block; }
  .uzone-file { font-size: 10px; color: var(--accent-blue); margin-top: 4px; word-break: break-all; }
  input[type=file] { display: none; }

  /* Divider */
  .sidebar-divider { height: 1px; background: var(--border-subtle); }

  /* Filters */
  .filter-section { display: flex; flex-direction: column; gap: 10px; }
  .filter-group { display: flex; flex-direction: column; gap: 5px; }
  .filter-group-header {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 10px; font-weight: 600; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .reset-link { font-size: 10px; color: var(--text-tertiary); background: none; border: none; cursor: pointer; text-decoration: underline; }
  .reset-link:hover { color: var(--text); }
  .filter-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip {
    font-size: 11px; padding: 3px 9px; border-radius: 12px;
    border: 1px solid var(--border); background: transparent;
    cursor: pointer; color: var(--text-secondary); transition: all 0.1s;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--text-secondary); color: var(--text); }
  .chip.on { background: var(--text); color: var(--bg); border-color: var(--text); }
  .chip .cnt { opacity: 0.55; font-size: 10px; margin-left: 2px; }

  /* Stat cards in sidebar */
  .stat-cards { display: flex; flex-direction: column; gap: 6px; }
  .stat-card {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
    border: 1px solid transparent; cursor: pointer; transition: all 0.1s;
  }
  .stat-card:hover { background: var(--bg); }
  .stat-card.on { border-color: rgba(0,0,0,.15); background: var(--bg); }
  .stat-card .indicator { width: 3px; height: 28px; border-radius: 2px; flex-shrink: 0; }
  .stat-card .label { font-size: 11px; color: var(--text-secondary); flex: 1; }
  .stat-card .count { font-size: 16px; font-weight: 600; }
  .sc-all .indicator { background: var(--text-tertiary); }
  .sc-all .count { color: var(--text); }
  .sc-fix .indicator { background: var(--fix-line); }
  .sc-fix .count { color: var(--accent-orange); }
  .sc-act .indicator { background: var(--act-line); }
  .sc-act .count { color: var(--accent-blue); }
  .sc-don .indicator { background: var(--don-line); }
  .sc-don .count { color: var(--accent-green); }
  .sc-drp .indicator { background: var(--drp-line); }
  .sc-drp .count { color: var(--text-tertiary); }
  .sc-note .indicator { background: #C8C5BE; }
  .sc-note .count { color: var(--text-secondary); }
  .sc-new .indicator { background: #639922; }
  .sc-new .count { color: var(--accent-green); }

  /* Search */
  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%; font-size: 12px; padding: 7px 10px 7px 30px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent-blue); }
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--text-tertiary); }

  /* ── Main ── */
  .main { padding: 1.5rem; display: flex; flex-direction: column; gap: 0; }

  /* Toolbar */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .result-count { font-size: 12px; color: var(--text-secondary); }
  .result-count strong { color: var(--text); font-weight: 600; }
  .active-filters { font-size: 11px; color: var(--text-tertiary); }

  /* Cards */
  .cards { display: flex; flex-direction: column; gap: 6px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    padding: 12px 14px;
    border-left-width: 3px;
    transition: box-shadow 0.1s;
  }
  .card:hover { box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .card.c-fix { border-left-color: var(--fix-line); }
  .card.c-act { border-left-color: var(--act-line); }
  .card.c-don { border-left-color: var(--don-line); }
  .card.c-drp { border-left-color: var(--drp-line); }
  .card.c-new { border-left-color: var(--accent-green); }
  .card.c-note { border-left-color: var(--note-line); }

  .card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .card-name { font-size: 12px; font-weight: 500; flex: 1; line-height: 1.5; letter-spacing: -0.2px; }
  .prod-tag {
    font-size: 10px; padding: 2px 7px; border-radius: 10px;
    background: var(--accent-blue-bg); color: var(--accent-blue);
    white-space: nowrap; flex-shrink: 0; margin-top: 1px;
  }
  .new-tag {
    font-size: 10px; padding: 1px 6px; border-radius: 10px;
    background: var(--accent-green-bg); color: var(--accent-green);
    margin-left: 5px; vertical-align: middle;
  }

  .arrow-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 5px; }
  .badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    font-weight: 500; white-space: nowrap;
  }
  .b-done { background: var(--accent-green-bg); color: var(--accent-green); }
  .b-fix  { background: var(--accent-orange-bg); color: var(--accent-orange); }
  .b-act  { background: var(--accent-blue-bg); color: var(--accent-blue); }
  .b-x    { background: var(--accent-gray-bg); color: var(--accent-gray); }
  .arrow  { font-size: 12px; color: var(--text-tertiary); }
  .same-label { font-size: 10px; color: var(--text-tertiary); margin-left: 4px; }

  .shimui-no {
    display: inline-block; font-size: 10px;
    background: var(--accent-blue-bg); color: var(--accent-blue);
    padding: 2px 8px; border-radius: 4px; margin-bottom: 5px;
    word-break: break-all; line-height: 1.5;
  }

  .note-row { font-size: 11px; color: var(--text-secondary); line-height: 1.6; }
  .note-label { font-size: 10px; font-weight: 500; color: var(--text-tertiary); margin-right: 3px; }
  .note-new { color: var(--accent-orange); }
  .note-prev { text-decoration: line-through; opacity: .45; }

  /* Empty / hint */
  .hint-box {
    background: var(--surface); border: 1px dashed var(--border);
    border-radius: 10px; padding: 3rem 2rem; text-align: center;
    color: var(--text-secondary); font-size: 13px; line-height: 1.7;
  }
  .hint-box .icon { font-size: 32px; display: block; margin-bottom: 10px; }
  .empty { text-align: center; padding: 2.5rem; color: var(--text-tertiary); font-size: 13px; }

  /* Pagination */
  .pagination { display: flex; gap: 4px; justify-content: center; margin-top: 16px; flex-wrap: wrap; align-items: center; }
  .pagination button {
    font-size: 11px; padding: 4px 10px;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface); cursor: pointer; color: var(--text-secondary);
    transition: all 0.1s;
  }
  .pagination button:hover { border-color: var(--text-secondary); }
  .pagination button.on { background: var(--text); color: var(--bg); border-color: var(--text); }
  .pg-info { font-size: 11px; color: var(--text-tertiary); margin: 0 4px; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-title">심의 변경 현황</div>
  <div class="header-sep"></div>
  <div class="header-sub" id="compare-label">파일을 업로드하면 자동 비교합니다</div>
  <div class="header-spacer"></div>
  <button id="copy-btn" onclick="copyResults()" style="font-size:11px;padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);cursor:pointer;color:var(--text-secondary);display:none">📋 결과 복사</button>
  <div class="saved-pill">
    <div class="saved-dot warn" id="saved-dot"></div>
    <span id="saved-msg">저장된 이전 버전 없음</span>
    <button class="clear-btn" onclick="clearSaved()">초기화</button>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Upload -->
    <div class="upload-section">
      <div class="upload-label">이전 버전 파일</div>
      <div class="uzone" id="uz-prev" onclick="document.getElementById('f-prev').click()">
        <span class="uzone-icon">📂</span>
        <div class="uzone-text"><strong>클릭하여 업로드</strong>.xlsx</div>
        <div class="uzone-file" id="fn-prev"></div>
      </div>
      <input type="file" id="f-prev" accept=".xlsx,.xls">

      <div class="upload-label" style="margin-top:4px">최신 버전 파일</div>
      <div class="uzone" id="uz-new" onclick="document.getElementById('f-new').click()">
        <span class="uzone-icon">📂</span>
        <div class="uzone-text"><strong>클릭하여 업로드</strong>.xlsx</div>
        <div class="uzone-file" id="fn-new"></div>
      </div>
      <input type="file" id="f-new" accept=".xlsx,.xls">
    </div>

    <div class="sidebar-divider"></div>

    <!-- Stat cards -->
    <div class="filter-section">
      <div class="filter-group-header">변경 현황</div>
      <div class="stat-cards">
        <div class="stat-card sc-all on" id="sc-all" onclick="clickCard('all')">
          <div class="indicator"></div><div class="label">전체 변경</div><div class="count" id="cnt-all">0</div>
        </div>
        <div class="stat-card sc-fix" id="sc-to_fix" onclick="clickCard('to_fix')">
          <div class="indicator"></div><div class="label">→ 수정요청</div><div class="count" id="cnt-fix">0</div>
        </div>
        <div class="stat-card sc-act" id="sc-to_active" onclick="clickCard('to_active')">
          <div class="indicator"></div><div class="label">→ 심의 진행중</div><div class="count" id="cnt-act">0</div>
        </div>
        <div class="stat-card sc-don" id="sc-to_done" onclick="clickCard('to_done')">
          <div class="indicator"></div><div class="label">→ 완료/승인</div><div class="count" id="cnt-don">0</div>
        </div>
        <div class="stat-card sc-drp" id="sc-to_drop" onclick="clickCard('to_drop')">
          <div class="indicator"></div><div class="label">→ 드랍/제외</div><div class="count" id="cnt-drp">0</div>
        </div>
        <div class="stat-card sc-note" id="sc-note_only" onclick="clickCard('note_only')">
          <div class="indicator"></div><div class="label">메모/심의번호 업뎃</div><div class="count" id="cnt-note">0</div>
        </div>
        <div class="stat-card sc-new" id="sc-new_item" onclick="clickCard('new_item')">
          <div class="indicator"></div><div class="label">신규 접수</div><div class="count" id="cnt-new">0</div>
        </div>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <!-- Filters -->
    <div class="filter-section">
      <div class="filter-group">
        <div class="filter-group-header">
          상품
          <button class="reset-link" onclick="resetProd()">초기화</button>
        </div>
        <div class="filter-chips" id="pbar"><span style="font-size:11px;color:var(--text-tertiary)">파일 업로드 후 표시</span></div>
      </div>
      <div class="filter-group">
        <div class="filter-group-header">
          상태
          <button class="reset-link" onclick="resetStat()">초기화</button>
        </div>
        <div class="filter-chips" id="sbar">
          <button class="chip" data-stat="to_fix" onclick="toggleStat(this)">→ 수정요청</button>
          <button class="chip" data-stat="to_active" onclick="toggleStat(this)">→ 심의 진행중</button>
          <button class="chip" data-stat="to_done" onclick="toggleStat(this)">→ 완료/승인</button>
          <button class="chip" data-stat="to_drop" onclick="toggleStat(this)">→ 드랍</button>
          <button class="chip" data-stat="note_only" onclick="toggleStat(this)">메모 업뎃</button>
          <button class="chip" data-stat="new_item" onclick="toggleStat(this)">신규 접수</button>
        </div>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="소재명 검색..." oninput="setQ(this.value)">
    </div>

  </aside>

  <!-- Main -->
  <main class="main">
    <div class="toolbar">
      <div class="result-count" id="result-count"></div>
      <div class="active-filters" id="active-filters"></div>
    </div>
    <div id="cards-wrap">
      <div class="hint-box">
        <span class="icon">📋</span>
        이전 파일과 최신 파일을 업로드하면<br>변경된 항목을 자동으로 비교해드립니다.<br>
        <span style="font-size:11px;color:var(--text-tertiary);margin-top:6px;display:block">최신 파일만 올려도 저장된 이전 버전과 자동 비교 · 복수 필터 선택 가능</span>
      </div>
    </div>
    <div class="pagination" id="pg"></div>
  </main>
</div>

<script>
const PER = 30;
let allRows = [], selStats = new Set(), selProds = new Set(), curQ = '', curPage = 1;
let prevData = null, newData = null;

// ── 파싱 ──
function parseXlsx(ab) {
  const wb = XLSX.read(ab, { type: 'array' });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  const rows = [];
  for (let i = 2; i < raw.length; i++) {
    const r = raw[i];
    const name = String(r[5] || '').trim();
    const status = String(r[7] || '').trim();
    if (!name || !status) continue;
    const sj = String(r[9] || '').trim();
    const sk = String(r[10] || '').trim();
    const si = String(r[8] || '').trim();
    const shimui_no = [sj, sk, si].find(v => v && v !== 'nan') || '';
    const note = String(r[11] || '').trim();
    rows.push({ name, status, shimui_no, note: note === 'nan' ? '' : note });
  }
  return rows;
}

function readFile(file, cb) {
  const reader = new FileReader();
  reader.onload = e => cb(new Uint8Array(e.target.result));
  reader.readAsArrayBuffer(file);
}

// ── Storage ──
function saveData(rows, filename) {
  try {
    localStorage.setItem('shimui-data', JSON.stringify(rows));
    localStorage.setItem('shimui-meta', JSON.stringify({ filename, at: new Date().toLocaleString('ko-KR') }));
  } catch(e) {}
}
function loadData() {
  try {
    const d = localStorage.getItem('shimui-data');
    const m = localStorage.getItem('shimui-meta');
    return d ? { rows: JSON.parse(d), meta: m ? JSON.parse(m) : null } : null;
  } catch(e) { return null; }
}
function clearSaved() {
  localStorage.removeItem('shimui-data');
  localStorage.removeItem('shimui-meta');
  prevData = null;
  updateSavedBadge(null);
}

function updateSavedBadge(meta) {
  const dot = document.getElementById('saved-dot');
  const msg = document.getElementById('saved-msg');
  if (meta) {
    dot.className = 'saved-dot ok';
    msg.textContent = `저장됨: ${meta.filename} (${meta.at})`;
  } else {
    dot.className = 'saved-dot warn';
    msg.textContent = '저장된 이전 버전 없음';
  }
}

// ── 업로드 ──
document.getElementById('f-prev').onchange = function () {
  if (!this.files[0]) return;
  const fn = this.files[0].name;
  document.getElementById('fn-prev').textContent = fn;
  document.getElementById('uz-prev').classList.add('ok');
  readFile(this.files[0], ab => {
    prevData = parseXlsx(ab);
    saveData(prevData, fn);
    updateSavedBadge({ filename: fn, at: new Date().toLocaleString('ko-KR') });
    if (newData) runCompare();
  });
};

document.getElementById('f-new').onchange = function () {
  if (!this.files[0]) return;
  const fn = this.files[0].name;
  document.getElementById('fn-new').textContent = fn;
  document.getElementById('uz-new').classList.add('ok');
  readFile(this.files[0], ab => {
    newData = parseXlsx(ab);
    if (!prevData) {
      const saved = loadData();
      if (saved) { prevData = saved.rows; updateSavedBadge(saved.meta); }
    }
    saveData(newData, fn);
    updateSavedBadge({ filename: fn, at: new Date().toLocaleString('ko-KR') });
    runCompare();
  });
};

// ── 복사 기능 ──
function copyResults() {
  const rows = filtered();
  if (!rows.length) { alert('복사할 항목이 없습니다.'); return; }
  const tmap = { to_fix:'→ 수정요청', to_active:'→ 심의 진행중', to_done:'→ 완료/승인', to_drop:'→ 드랍/제외', note_only:'메모/심의번호 업뎃', new_item:'신규 접수' };
  let text = `심의 변경 현황\n`;
  const af = document.getElementById('active-filters').textContent;
  if (af) text += `${af}\n`;
  text += `총 ${rows.length}건\n${'─'.repeat(60)}\n`;
  let lastType = null;
  rows.forEach((r, i) => {
    const shimui = addPeriod(r.shimui_no);
    // 상태 그룹 구분선
    if (r.type !== lastType) {
      if (lastType !== null) text += '\n';
      text += `▶ ${tmap[r.type]||r.type}\n${'─'.repeat(50)}\n`;
      lastType = r.type;
    }
    text += `\n[${i+1}] ${r.name}\n`;
    if (r.type === 'to_done') {
      // 심의완료는 파일명 + 심의번호만
      if (shimui) text += `    ${shimui}\n`;
    } else {
      text += `    ${r.status}`;
      if (r.prevStatus && r.prevStatus !== r.status) text += ` (이전: ${r.prevStatus})`;
      text += '\n';
      if (shimui) text += `    ${shimui}\n`;
      if (r.note) text += `    수정의견: ${r.note}\n`;
    }
  });
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✅ 복사됨!';
    setTimeout(() => { btn.textContent = '📋 결과 복사'; }, 2000);
  }).catch(() => { alert('복사 실패 — 브라우저가 클립보드 접근을 차단했습니다.'); });
}

// ── 비교 ──
function runCompare() {
  // 소재명별 마지막 행(최신 이력) 기준으로 비교
  const prevLast = {};
  if (prevData) prevData.forEach(r => { prevLast[r.name] = r; });
  const newLast = {};
  newData.forEach(r => { newLast[r.name] = r; });

  const changed = [];
  const allNames = [...new Set(newData.map(r => r.name))];

  for (const name of allNames) {
    const nr = newLast[name];
    const pr = prevLast[name];
    if (!nr) continue;

    if (!pr) {
      // 이전 파일에 없는 소재 → 신규 접수
      changed.push({ ...nr, prevStatus: '', prevNote: '', type: 'new_item' });
    } else if (pr.status !== nr.status) {
      // 상태 변경
      const ft = toType(nr.status);
      if (ft) changed.push({ ...nr, prevStatus: pr.status, prevNote: pr.note, type: ft });
    } else if (pr.note !== nr.note && nr.note) {
      // note가 새로 생겼거나 달라진 경우
      changed.push({ ...nr, prevStatus: nr.status, prevNote: pr.note, type: 'note_only' });
    } else if (!pr.shimui_no && nr.shimui_no) {
      // 심의번호가 새로 생긴 경우 (없었다가 채워진 것)
      changed.push({ ...nr, prevStatus: nr.status, prevNote: pr.note, type: 'note_only' });
    }
  }
  allRows = changed;
  buildProdBar();
  resetAll();
  document.getElementById('compare-label').textContent = `총 ${changed.length}건 변경`;
  document.getElementById('copy-btn').style.display = '';
}

function toType(s) {
  if (!s) return null;
  if (/완료|승인|적격|심사완료|조건부/.test(s)) return 'to_done';
  if (/수정요청|수정 요청|반려|부적격/.test(s)) return 'to_fix';
  if (/심의중|재심의|사내|협회|수정사항|재심의대기/.test(s)) return 'to_active';
  if (/드랍|제외/.test(s)) return 'to_drop';
  return null;
}

function updateCounts() {
  // 상품 필터만 적용한 기준으로 카드 숫자 계산 (상태 필터는 제외 — 상태별 분포를 보여주기 위해)
  let base = allRows;
  if (selProds.size > 0) base = base.filter(r => selProds.has(getProd(r.name)));
  if (curQ) base = base.filter(r => r.name.toLowerCase().includes(curQ.toLowerCase()));

  document.getElementById('cnt-all').textContent = base.length;
  document.getElementById('cnt-fix').textContent = base.filter(r => r.type === 'to_fix').length;
  document.getElementById('cnt-act').textContent = base.filter(r => r.type === 'to_active').length;
  document.getElementById('cnt-don').textContent = base.filter(r => r.type === 'to_done').length;
  document.getElementById('cnt-drp').textContent = base.filter(r => r.type === 'to_drop').length;
  document.getElementById('cnt-note').textContent = base.filter(r => r.type === 'note_only').length;
  document.getElementById('cnt-new').textContent = base.filter(r => r.type === 'new_item').length;
}

// ── 상품 분류 ──
function getProd(n) {
  if (!n) return '기타';
  if (n.includes('신제품검색')) return '신제품검색';
  if (n.includes('네이버파워컨텐츠') || n.includes('네이버 파워컨텐츠')) return '네이버파워컨텐츠';
  if (n.includes('네이버브검')) return '네이버브검';
  if (n.includes('네이버검색')) return '네이버검색';
  if (n.includes('사이트')) return '사이트';
  if (n.includes('서칭뷰')) return '서칭뷰';
  if (n.includes('구글')) return '구글검색';
  if (n.includes('IFDO')) return 'IFDO';
  if (n.includes('다음브검')) return '다음브검';
  if (n.includes('다음검색')) return '다음검색';
  if (n.includes('네이트브검')) return '네이트브검';
  if (n.includes('네이트배너')) return '네이트배너';
  if (n.includes('네이트')) return '네이트';
  if (n.includes('빙검색')) return '빙검색';
  if (n.includes('DLPO')) return 'DLPO';
  if (n.includes('톡채널검색')) return '톡채널검색';
  if (n.includes('줌')) return '줌';
  if (n.includes('애딘판')) return '애딘판';
  return '기타';
}

function buildProdBar() {
  const cnt = {};
  allRows.forEach(r => { const p = getProd(r.name); cnt[p] = (cnt[p] || 0) + 1; });
  const sorted = Object.entries(cnt).sort((a, b) => b[1] - a[1]);
  let html = '';
  sorted.forEach(([p, c]) => {
    html += `<button class="chip" data-prod="${p}" onclick="toggleProd(this)">${p}<span class="cnt">${c}</span></button>`;
  });
  document.getElementById('pbar').innerHTML = html || '<span style="font-size:11px;color:var(--text-tertiary)">없음</span>';
}

// ── 필터 ──
function toggleStat(el) {
  const s = el.dataset.stat;
  if (selStats.has(s)) { selStats.delete(s); el.classList.remove('on'); }
  else { selStats.add(s); el.classList.add('on'); }
  syncStatCards(); curPage = 1; render();
}
function toggleProd(el) {
  const p = el.dataset.prod;
  if (selProds.has(p)) { selProds.delete(p); el.classList.remove('on'); }
  else { selProds.add(p); el.classList.add('on'); }
  curPage = 1; render();
}
function resetStat() {
  selStats.clear();
  document.querySelectorAll('#sbar .chip').forEach(b => b.classList.remove('on'));
  syncStatCards(); curPage = 1; render();
}
function resetProd() {
  selProds.clear();
  document.querySelectorAll('#pbar .chip').forEach(b => b.classList.remove('on'));
  curPage = 1; render();
}
function resetAll() { resetStat(); resetProd(); curQ = ''; curPage = 1; render(); }

function clickCard(type) {
  if (type === 'all') { resetStat(); return; }
  if (selStats.has(type) && selStats.size === 1) { resetStat(); return; }
  selStats.clear(); selStats.add(type);
  document.querySelectorAll('#sbar .chip').forEach(b => b.classList.toggle('on', b.dataset.stat === type));
  syncStatCards(); curPage = 1; render();
}
function syncStatCards() {
  document.querySelectorAll('.stat-card').forEach(el => el.classList.remove('on'));
  if (selStats.size === 0) { document.getElementById('sc-all').classList.add('on'); }
  else if (selStats.size === 1) {
    const m = { to_fix: 'sc-to_fix', to_active: 'sc-to_active', to_done: 'sc-to_done', to_drop: 'sc-to_drop', note_only: 'sc-note_only', new_item: 'sc-new_item' };
    const id = m[[...selStats][0]];
    if (id) document.getElementById(id)?.classList.add('on');
  }
}
function setQ(v) { curQ = v; curPage = 1; render(); }

// ── 심의번호 기간 계산 ──
function addPeriod(s) {
  if (!s || !s.includes('손해보험협회 심의필') || s.includes('~')) return s;
  const m = s.match(/\((\d{4})\.(\d{2})\.(\d{2})\)/);
  if (!m) return s;
  const d = new Date(+m[1], +m[2] - 1, +m[3]);
  d.setFullYear(d.getFullYear() + 1); d.setDate(d.getDate() - 2);
  const p = n => String(n).padStart(2, '0');
  return s.replace(`(${m[1]}.${m[2]}.${m[3]})`, `(${m[1]}.${m[2]}.${m[3]}~${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())})`);
}

// ── 배지 ──
function sC(s) {
  if (!s) return 'x';
  if (/완료|승인|적격|심사완료|조건부/.test(s)) return 'done';
  if (/수정요청|수정 요청|반려|부적격/.test(s)) return 'fix';
  if (/심의중|재심의|사내|협회|수정사항|재심의대기/.test(s)) return 'active';
  if (/드랍|제외/.test(s)) return 'drop';
  return 'x';
}
function badge(s) {
  if (!s) return '<span style="color:var(--text-tertiary);font-size:10px">-</span>';
  const c = sC(s), cl = c === 'done' ? 'b-done' : c === 'fix' ? 'b-fix' : c === 'active' ? 'b-act' : 'b-x';
  return `<span class="badge ${cl}">${s}</span>`;
}
function cardCls(t) { return t==='to_fix'?'c-fix':t==='to_active'?'c-act':t==='to_done'?'c-don':t==='to_drop'?'c-drp':t==='new_item'?'c-new':'c-note'; }

// ── 렌더 ──
const TYPE_ORDER = { to_fix: 0, to_active: 1, to_done: 2, to_drop: 3, note_only: 4, new_item: 5 };

function filtered() {
  let r = allRows;
  if (selStats.size > 0) r = r.filter(x => selStats.has(x.type));
  if (selProds.size > 0) r = r.filter(x => selProds.has(getProd(x.name)));
  if (curQ) r = r.filter(x => x.name.toLowerCase().includes(curQ.toLowerCase()));
  // 상태 순서 정렬: 수정요청 → 심의진행 → 완료 → 드랍 → 메모업뎃 → 신규
  r = [...r].sort((a, b) => (TYPE_ORDER[a.type] ?? 9) - (TYPE_ORDER[b.type] ?? 9));
  return r;
}

function updateAF() {
  const tmap = { to_fix:'수정요청', to_active:'심의진행', to_done:'완료', to_drop:'드랍', note_only:'메모업뎃', new_item:'신규접수' };
  const pts = [];
  if (selStats.size > 0) pts.push([...selStats].map(s => tmap[s] || s).join('+'));
  if (selProds.size > 0) pts.push([...selProds].join('+'));
  if (curQ) pts.push(`"${curQ}"`);
  document.getElementById('active-filters').textContent = pts.length ? `필터: ${pts.join(' · ')}` : '';
}

function render() {
  updateCounts();
  const rows = filtered();
  const total = rows.length;
  const pages = Math.max(1, Math.ceil(total / PER));
  if (curPage > pages) curPage = 1;
  const slice = rows.slice((curPage - 1) * PER, curPage * PER);

  document.getElementById('result-count').innerHTML = allRows.length
    ? `<strong>${total.toLocaleString()}건</strong> 표시 중 / 전체 ${allRows.length.toLocaleString()}건`
    : '';

  const wrap = document.getElementById('cards-wrap');
  if (!allRows.length) {
    wrap.innerHTML = '<div class="hint-box"><span class="icon">📋</span>이전 파일과 최신 파일을 업로드하면<br>변경된 항목을 자동으로 비교해드립니다.<br><span style="font-size:11px;color:var(--text-tertiary);margin-top:6px;display:block">최신 파일만 올려도 저장된 이전 버전과 자동 비교</span></div>';
    document.getElementById('pg').innerHTML = '';
    updateAF(); return;
  }
  if (!slice.length) {
    wrap.innerHTML = '<div class="empty">해당하는 변경 항목이 없습니다.</div>';
    document.getElementById('pg').innerHTML = '';
    updateAF(); return;
  }

  wrap.innerHTML = '<div class="cards">' + slice.map(r => {
    const cc = cardCls(r.type);
    const prod = getProd(r.name);
    const shimui = addPeriod(r.shimui_no);
    const isNew = !r.prevStatus;
    const statusChanged = r.status !== r.prevStatus;
    let shimuiHtml = shimui ? `<div><span class="shimui-no">📋 ${shimui}</span></div>` : '';
    let noteHtml = '';
    const hasCurr = r.note && r.note.trim(), hasPrev = r.prevNote && r.prevNote.trim();
    if (hasCurr) {
      const prev = hasPrev ? `<span class="note-label">이전:</span><span class="note-prev">${r.prevNote.substring(0, 50)}${r.prevNote.length > 50 ? '…' : ''}</span><br>` : '';
      noteHtml = `<div class="note-row">${prev}<span class="note-label">수정의견:</span><span class="note-new">${r.note.substring(0, 150)}${r.note.length > 150 ? '…' : ''}</span></div>`;
    } else if (hasPrev) {
      noteHtml = `<div class="note-row"><span class="note-label">이전:</span>${r.prevNote.substring(0, 80)}${r.prevNote.length > 80 ? '…' : ''}</div>`;
    }
    const arrowRow = statusChanged && r.prevStatus
      ? `<div class="arrow-row">${badge(r.prevStatus)}<span class="arrow">→</span>${badge(r.status)}</div>`
      : `<div class="arrow-row">${badge(r.status)}<span class="same-label">${isNew ? '(신규 소재)' : '(상태 동일)'}</span></div>`;
    return `<div class="card ${cc}">
      <div class="card-top">
        <div class="card-name">${r.name}${isNew ? '<span class="new-tag">신규</span>' : ''}</div>
        <span class="prod-tag">${prod}</span>
      </div>
      ${arrowRow}${shimuiHtml}${noteHtml}
    </div>`;
  }).join('') + '</div>';

  // Pagination
  const pg = document.getElementById('pg');
  if (pages <= 1) { pg.innerHTML = ''; updateAF(); return; }
  let btns = '';
  if (curPage > 1) btns += `<button onclick="goPage(${curPage - 1})">‹ 이전</button>`;
  const st = Math.max(1, curPage - 2), en = Math.min(pages, st + 4);
  for (let i = st; i <= en; i++) btns += `<button class="${i === curPage ? 'on' : ''}" onclick="goPage(${i})">${i}</button>`;
  if (curPage < pages) btns += `<button onclick="goPage(${curPage + 1})">다음 ›</button>`;
  btns += `<span class="pg-info">${pages}페이지 중 ${curPage}</span>`;
  pg.innerHTML = btns;
  updateAF();
}

function goPage(n) {
  curPage = n; render();
  document.querySelector('.main').scrollTo(0, 0);
}

// ── 초기 로드 ──
(function init() {
  const saved = loadData();
  if (saved) { prevData = saved.rows; updateSavedBadge(saved.meta); }
  render();
})();
</script>
</body>
</html>
